name: fixcity
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.3.0
  cloud_firestore: ^6.1.1
  firebase_storage: ^13.0.5
  image_picker: ^1.2.1
  geolocator: ^14.0.2
  google_generative_ai: ^0.4.7
  uuid: ^4.5.2
  intl: ^0.20.2
  http: ^1.2.0
  flutter_dotenv: ^5.1.0
  flutter_map: ^6.1.0 
  # Needed for handling Latitude/Longitude coordinates
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # ✅ FIXED INDENTATION HERE
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0

# Configuration for the icons
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/